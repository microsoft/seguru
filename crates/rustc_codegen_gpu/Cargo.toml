[package]
name = "rustc_codegen_gpu"
version = "0.1.0"
edition = "2021"

[dependencies]
melior = { version = "0.24.0", features = ["helpers"]}
melior-macro = { version = "0.17.0"}
mlir-sys = "0.5.0"
log = "0.4.1"
log-derive = "0.4.1"
env_logger = "0.11"
which = "4.4"

[lib]
crate-type = ["dylib"]

[package.metadata.rust-analyzer]
rustc_private = true