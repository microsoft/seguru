[workspace]
members = [
    "hello",
    "histogram",
    "llm-rs-gpu",
    "matrix/matmul-gpu",
    "matrix/matmul-host",
    "reduce",
    "syntax/gpu",
    "syntax/host",
    "vector_add",
]
resolver = "1"

[workspace.dependencies]
gpu_host = {path = "../crates/gpu-host"}
gpu = { path = "../crates/gpu" }
syntax_gpu = {path = "syntax/gpu"}

[profile.dev]
overflow-checks = true

[profile.release]
overflow-checks = false
